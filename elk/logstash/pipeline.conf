# elk/logstash/pipeline.conf
# Ingests structured JSON logs from Envoy, OPA, and services.
# Adds keyed HMAC-SHA256 hash chaining for log integrity (CyBOK accountability).

input {
  # HTTP input — services POST JSON logs here. Basic auth prevents any container
  # on the network from injecting forged audit records. Shippers must send
  # Authorization: Basic base64("ztac:<LOGSTASH_INGEST_TOKEN>").
  http {
    port => 5050
    codec => json
    additional_codecs => {}
    user => "ztac"
    password => "${LOGSTASH_INGEST_TOKEN:ztac-default-ingest-token}"
  }
}

filter {
  # Ensure every log has a timestamp
  if ![timestamp] {
    ruby {
      code => 'event.set("timestamp", Time.now.utc.iso8601(3))'
    }
  }

  # Normalise the source field
  if ![source_component] {
    mutate {
      add_field => { "source_component" => "unknown" }
    }
  }

  # =========================================================
  # HASH CHAINING — cryptographic log integrity
  # Each log's hash = HMAC-SHA256(key, previous_hash + current_body)
  # The HMAC key (AUDIT_HMAC_KEY) is a secret held only by Logstash and the
  # verifier, so an attacker with write access to Elasticsearch cannot
  # recompute a consistent chain after tampering — they would need the key.
  # This enables tamper detection in the accountability audit.
  # =========================================================
  ruby {
    code => '
      require "openssl"
      require "json"

      hmac_key = ENV["AUDIT_HMAC_KEY"]
      if hmac_key.nil? || hmac_key.empty?
        raise "FATAL: AUDIT_HMAC_KEY is not set. Refusing to produce audit logs " \
              "without a secret chaining key. Run scripts/bootstrap.sh or set " \
              "AUDIT_HMAC_KEY in .env."
      end

      # Build the log body to hash (exclude meta + chain fields)
      body_fields = {}
      event.to_hash.each do |k, v|
        next if k.start_with?("@") || k == "log_hash" || k == "previous_hash" || k == "log_body_for_hash"
        body_fields[k] = v
      end
      body_json = body_fields.sort.to_h.to_json

      # Read previous hash from a file (shared state across events)
      hash_file = "/tmp/logstash_last_hash"
      previous_hash = "GENESIS"
      if File.exist?(hash_file)
        previous_hash = File.read(hash_file).strip
      end

      # Compute current keyed hash
      current_hash = OpenSSL::HMAC.hexdigest("SHA256", hmac_key, previous_hash + body_json)

      # Store for next event
      File.write(hash_file, current_hash)

      event.set("previous_hash", previous_hash)
      event.set("log_hash", current_hash)
      event.set("log_body_for_hash", body_json)
    '
  }

  # Add a sequence number for ordering
  ruby {
    code => '
      seq_file = "/tmp/logstash_seq"
      seq = 0
      if File.exist?(seq_file)
        seq = File.read(seq_file).strip.to_i
      end
      seq += 1
      File.write(seq_file, seq.to_s)
      event.set("log_sequence", seq)
    '
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "ztac-audit-%{+YYYY.MM.dd}"
  }

  # Also print to stdout for debugging
  stdout {
    codec => json_lines
  }
}
