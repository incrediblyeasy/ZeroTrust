networks:
  ztac-net:
    driver: bridge

services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: ztac-keycloak
    command: start-dev --import-realm --health-enabled=true
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME_URL: http://keycloak:8080
      KC_HOSTNAME_STRICT: "false"
    ports:
      # Bound to loopback so the IdP/admin console is not exposed on the LAN.
      - "127.0.0.1:${KEYCLOAK_HTTP_PORT}:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks:
      - ztac-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  protected-service:
    build: ./services/protected-service
    container_name: ztac-protected-service
    ports:
      # Loopback only. The service now also enforces app-level gateway auth, so
      # a direct call (bypassing Envoy/OPA) is rejected even from localhost.
      - "127.0.0.1:${PROTECTED_SERVICE_PORT}:8000"
    environment:
      - KEYCLOAK_ISSUER=http://keycloak:8080/realms/${KEYCLOAK_REALM}
      - LOGSTASH_URL=http://logstash:5050
      - INTERNAL_GATEWAY_SECRET=${INTERNAL_GATEWAY_SECRET}
    networks:
      - ztac-net
    depends_on:
      keycloak:
        condition: service_healthy
      logstash:
        condition: service_started

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.1
    container_name: ztac-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS}
    ports:
      # Loopback only — the audit store has no auth in this lab profile.
      - "127.0.0.1:${ES_HTTP_PORT}:9200"
    networks:
      - ztac-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  logstash:
    image: docker.elastic.co/logstash/logstash:8.14.1
    container_name: ztac-logstash
    volumes:
      - ./elk/logstash/pipeline.conf:/usr/share/logstash/pipeline/pipeline.conf:ro
    ports:
      # Loopback only — the log ingest endpoints are unauthenticated; do not
      # expose them on the LAN where arbitrary audit records could be injected.
      - "127.0.0.1:${LOGSTASH_TCP_PORT}:5044"
      - "127.0.0.1:${LOGSTASH_HTTP_PORT}:5050"
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
      - PIPELINE_WORKERS=1
      - PIPELINE_ORDERED=true
      - PIPELINE_BATCH_SIZE=1
      # Secret key for the HMAC-chained tamper-evident audit log.
      - AUDIT_HMAC_KEY=${AUDIT_HMAC_KEY}
    networks:
      - ztac-net
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.1
    container_name: ztac-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      # Loopback only — Kibana has no auth in this lab profile.
      - "127.0.0.1:${KIBANA_HTTP_PORT}:5601"
    networks:
      - ztac-net
    depends_on:
      elasticsearch:
        condition: service_healthy

  opa:
    build: ./opa
    container_name: ztac-opa
    ports:
      # Loopback only — OPA's management API (policy push) is unauthenticated;
      # never expose the PDP on the LAN. The gateway reaches it over ztac-net.
      - "127.0.0.1:${OPA_HTTP_PORT}:8181"
    networks:
      - ztac-net
    healthcheck:
      test: ["CMD", "/bin/busybox", "wget", "-q", "-O", "-", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  api-gateway:
    build: ./services/api-gateway
    container_name: ztac-api-gateway
    ports:
      # Loopback only — application traffic should go through Envoy (8080).
      - "127.0.0.1:8001:8001"
    environment:
      - KEYCLOAK_ISSUER=http://keycloak:8080/realms/${KEYCLOAK_REALM}
      - KEYCLOAK_GATEWAY_CLIENT_ID=${KEYCLOAK_GATEWAY_CLIENT_ID}
      - PROTECTED_SERVICE_URL=http://protected-service:8000
      - OPA_URL=http://opa:8181
      - LOGSTASH_URL=http://logstash:5050
      - INTERNAL_GATEWAY_SECRET=${INTERNAL_GATEWAY_SECRET}
      - JWT_ALLOWED_AZP=${JWT_ALLOWED_AZP:-ztac-cli,ztac-gateway}
    volumes:
      - ./services/shared:/app/shared:ro
    networks:
      - ztac-net
    depends_on:
      keycloak:
        condition: service_healthy
      opa:
        condition: service_healthy
      protected-service:
        condition: service_started

  envoy:
    build: ./envoy
    container_name: ztac-envoy
    ports:
      # Loopback only for the lab. To accept LAN/remote traffic, terminate TLS
      # here first, then publish on 0.0.0.0.
      - "127.0.0.1:${ENVOY_HTTP_PORT}:8080"
    networks:
      - ztac-net
    depends_on:
      opa:
        condition: service_healthy
      api-gateway:
        condition: service_started
